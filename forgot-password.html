<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password — Lumière</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <main id="main-content" class="auth-shell page-transition">
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=900&q=80" alt="Soft-toned skincare products on a marble surface">
      <div class="auth-visual-caption">
        <h2>No worries — we'll get you back in.</h2>
        <p>Reset links are valid for 15 minutes for your security.</p>
      </div>
    </div>

    <div class="auth-panel">
      <div class="auth-form-wrap">
        <a href="index.html" class="auth-brand">
          <span class="brand-mark" aria-hidden="true"></span>
          Lumière
        </a>

        <div class="auth-step-icon" aria-hidden="true">🔑</div>
        <h1 class="auth-heading">Forgot your password?</h1>
        <p class="auth-subheading">Enter the email linked to your account and we'll send a reset link.</p>

        <form class="auth-form" data-auth-form data-success-title="Reset link sent" data-success-message="Check your inbox for next steps." novalidate>
          <div class="field" data-field="email">
            <label class="field-label" for="reset-email">Email</label>
            <input class="field-input" type="email" id="reset-email" name="email" placeholder="you@example.com" autocomplete="email" required>
            <p class="field-error" role="alert"></p>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">Send reset link</button>
        </form>

        <p class="auth-footer-note"><a href="signin.html" class="link-accent">← Back to sign in</a></p>
      </div>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/pages/auth.js"></script>
</body>
</html>
