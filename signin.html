<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Lumière</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <main id="main-content" class="auth-shell page-transition">
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1512207736890-6ffed4b6ad57?w=900&q=80" alt="Close-up of radiant, well-cared-for skin">
      <div class="auth-visual-caption">
        <h2>Welcome back to your routine.</h2>
        <p>Pick up where you left off — new posts from creators you follow are waiting.</p>
      </div>
    </div>

    <div class="auth-panel">
      <div class="auth-form-wrap">
        <a href="index.html" class="auth-brand">
          <span class="brand-mark" aria-hidden="true"></span>
          Lumière
        </a>
        <h1 class="auth-heading">Sign in</h1>
        <p class="auth-subheading">Enter your details to access your account.</p>

        <form class="auth-form" data-auth-form data-success-title="Welcome back!" data-success-message="You're signed in." novalidate>
          <div class="field" data-field="email">
            <label class="field-label" for="signin-email">Email</label>
            <input class="field-input" type="email" id="signin-email" name="email" placeholder="you@example.com" autocomplete="email" required>
            <p class="field-error" role="alert"></p>
          </div>

          <div class="field" data-field="password">
            <label class="field-label" for="signin-password">Password</label>
            <div class="password-field">
              <input class="field-input" type="password" id="signin-password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
              <button type="button" class="password-toggle" data-password-toggle="signin-password">Show</button>
            </div>
            <p class="field-error" role="alert"></p>
          </div>

          <div class="auth-form-row">
            <label class="checkbox-row">
              <input type="checkbox" name="remember">
              Remember me
            </label>
            <a href="forgot-password.html" class="link-accent">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">Sign in</button>

          <div class="divider auth-divider">or continue with</div>

          <div class="social-auth-group">
            <button type="button" class="social-auth-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Continue with Google
            </button>
            <button type="button" class="social-auth-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.05 20.28c-.98.95-2.05.86-3.12.44-1.14-.44-2.19-.46-3.39 0-1.51.6-2.31.4-3.15-.44C2.79 15.5 3.51 8.32 8.28 8.06c1.32.06 2.24.72 3.01.78.9-.16 1.94-.86 3.34-.72 1.65.14 2.87.94 3.64 2.24-3.28 1.98-2.75 6.34.7 7.68-.68 1.4-1.55 2.78-1.92 3.24zM12.03 7.94c-.19-2.44 1.86-4.5 4.15-4.94.32 2.28-2.02 4.93-4.15 4.94z"/></svg>
              Continue with Apple
            </button>
          </div>
        </form>

        <p class="auth-footer-note">Don't have an account? <a href="signup.html" class="link-accent">Sign up</a></p>
      </div>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/pages/auth.js"></script>
</body>
</html>
