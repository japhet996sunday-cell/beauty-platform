<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create your account — Lumière</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <main id="main-content" class="auth-shell page-transition">
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1596704017254-9b121068fb31?w=900&q=80" alt="Assortment of skincare products styled elegantly">
      <div class="auth-visual-caption">
        <h2>Your routine has a home here.</h2>
        <p>Join a community of 180,000+ creators sharing what actually works.</p>
      </div>
    </div>

    <div class="auth-panel">
      <div class="auth-form-wrap">
        <a href="index.html" class="auth-brand">
          <span class="brand-mark" aria-hidden="true"></span>
          Lumière
        </a>
        <h1 class="auth-heading">Create your account</h1>
        <p class="auth-subheading">Start sharing and discovering in minutes.</p>

        <form class="auth-form" data-auth-form data-success-title="Account created" data-success-message="Welcome to Lumière!" novalidate>
          <div class="field" data-field="required">
            <label class="field-label" for="signup-name">Full name</label>
            <input class="field-input" type="text" id="signup-name" name="name" placeholder="Your name" autocomplete="name" required>
            <p class="field-error" role="alert"></p>
          </div>

          <div class="field" data-field="email">
            <label class="field-label" for="signup-email">Email</label>
            <input class="field-input" type="email" id="signup-email" name="email" placeholder="you@example.com" autocomplete="email" required>
            <p class="field-error" role="alert"></p>
          </div>

          <div class="field" data-field="password">
            <label class="field-label" for="signup-password">Password</label>
            <div class="password-field">
              <input class="field-input" type="password" id="signup-password" name="password" placeholder="At least 8 characters" autocomplete="new-password" data-strength-input required>
              <button type="button" class="password-toggle" data-password-toggle="signup-password">Show</button>
            </div>
            <div class="password-strength">
              <span class="password-strength-bar" data-strength-bar></span>
              <span class="password-strength-bar" data-strength-bar></span>
              <span class="password-strength-bar" data-strength-bar></span>
              <span class="password-strength-bar" data-strength-bar></span>
            </div>
            <p class="field-hint" data-strength-label></p>
            <p class="field-error" role="alert"></p>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" name="terms" required>
            I agree to the <a href="#" class="link-accent">Terms</a> and <a href="#" class="link-accent">Privacy Policy</a>
          </label>

          <button type="submit" class="btn btn-primary btn-block btn-lg">Create account</button>

          <div class="divider auth-divider">or continue with</div>

          <div class="social-auth-group">
            <button type="button" class="social-auth-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Continue with Google
            </button>
          </div>
        </form>

        <p class="auth-footer-note">Already have an account? <a href="signin.html" class="link-accent">Sign in</a></p>
      </div>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/pages/auth.js"></script>
</body>
  </html>
