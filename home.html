<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home — Lumière</title>
  <meta name="description" content="Your Lumière feed — routines, reviews, and moments from creators you follow.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <header class="app-header is-app-shell">
    <div class="container">
      <a href="home.html" class="brand" aria-label="Lumière home">
        <span class="brand-mark" aria-hidden="true"></span>
        Lumière
      </a>

      <nav class="nav-primary" aria-label="Primary">
        <a href="home.html" class="nav-link is-active">Home</a>
        <a href="discover.html" class="nav-link">Discover</a>
        <a href="messages.html" class="nav-link">Messages</a>
        <a href="notifications.html" class="nav-link">Notifications</a>
      </nav>

      <div class="nav-search">
        <svg class="nav-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" placeholder="Search creators, routines, tags" aria-label="Search Lumière">
      </div>

      <div class="nav-actions">
        <button type="button" class="theme-toggle-btn" data-theme-toggle aria-label="Toggle dark mode">
          <svg class="theme-icon-light" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="theme-icon-dark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
        </button>
        <a href="notifications.html" class="nav-icon-btn" aria-label="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          <span class="dot-indicator" aria-hidden="true"></span>
        </a>
        <a href="profile.html">
          <img class="avatar avatar-sm" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=100&q=80" alt="Your profile">
        </a>
        <button type="button" class="nav-icon-btn menu-toggle" data-menu-toggle aria-label="Open menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="mobile-drawer" data-mobile-drawer aria-hidden="true">
    <div class="mobile-drawer-overlay" data-drawer-overlay></div>
    <div class="mobile-drawer-panel">
      <div class="mobile-drawer-header">
        <span class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          Lumière
        </span>
        <button type="button" class="nav-icon-btn" data-drawer-close aria-label="Close menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="mobile-drawer-nav" aria-label="Mobile">
        <a href="home.html" class="mobile-drawer-link is-active">Home</a>
        <a href="discover.html" class="mobile-drawer-link">Discover</a>
        <a href="messages.html" class="mobile-drawer-link">Messages</a>
        <a href="notifications.html" class="mobile-drawer-link">Notifications</a>
        <a href="profile.html" class="mobile-drawer-link">Profile</a>
        <a href="settings.html" class="mobile-drawer-link">Settings</a>
      </nav>
    </div>
  </div>

  <main id="main-content" class="page-transition">
    <div class="container feed-layout">
      <div class="feed-main">
        <ul class="stories-rail" data-stories-rail aria-label="Stories"></ul>

        <a href="create.html" class="card composer-trigger-card">
          <img class="avatar avatar-sm" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=100&q=80" alt="">
          <span class="composer-trigger-input">Share your routine or a product review…</span>
        </a>

        <div data-feed-container></div>
        <div data-feed-sentinel aria-hidden="true"></div>
      </div>

      <aside class="feed-sidebar" aria-label="Suggestions">
        <div class="card feed-sidebar-card">
          <h3 class="mb-4">Suggested for you</h3>
          <div data-suggestions-list></div>
        </div>
      </aside>
    </div>
  </main>

  <div class="story-viewer-overlay" data-story-viewer aria-hidden="true">
    <div class="story-viewer-frame">
      <div class="story-progress-track" data-story-progress></div>
      <div data-story-header></div>
      <div class="story-viewer-image" data-story-image>
        <button type="button" class="story-tap-zone story-tap-zone--prev" data-story-prev-zone aria-label="Previous story"></button>
        <button type="button" class="story-tap-zone story-tap-zone--next" data-story-next-zone aria-label="Next story"></button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a href="home.html" class="bottom-nav-link is-active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Home
    </a>
    <a href="discover.html" class="bottom-nav-link">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      Discover
    </a>
    <a href="create.html" class="bottom-nav-link">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="6"/><path d="M12 8v8M8 12h8"/></svg>
      Create
    </a>
    <a href="messages.html" class="bottom-nav-link">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Messages
    </a>
    <a href="profile.html" class="bottom-nav-link">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
      Profile
    </a>
  </nav>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/pages/home.js"></script>
</body>
</html>
